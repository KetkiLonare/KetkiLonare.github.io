<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Full Stack Mastery — Syllabus & Roadmap</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d2e; --surface2: #252840;
      --text: #e2e8f0; --muted: #718096; --done: #48bb78; --border: #2d3748;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 1.5rem 1rem; }
    h1 { text-align: center; font-size: 1.8rem; margin-bottom: 0.3rem; background: linear-gradient(135deg, #7c6af7, #56cfb2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .subtitle { text-align: center; color: var(--muted); margin-bottom: 1.2rem; font-size: 0.82rem; }

    /* TABS */
    .tabs { display: flex; justify-content: center; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.2rem; }
    .tab-btn { padding: 0.4rem 1rem; border-radius: 8px; border: 2px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; font-size: 0.82rem; font-weight: 600; transition: all 0.2s; }
    .tab-btn:hover { color: var(--text); border-color: #555; }
    .tab-btn.active { color: #fff; border-color: transparent; }
    .tab-btn[data-tech="js"].active      { background:#f7df1e; color:#000; }
    .tab-btn[data-tech="react"].active   { background:#61dafb; color:#000; }
    .tab-btn[data-tech="node"].active    { background:#68a063; color:#fff; }
    .tab-btn[data-tech="mysql"].active   { background:#00758f; color:#fff; }
    .tab-btn[data-tech="mongo"].active   { background:#13aa52; color:#fff; }
    .tab-btn[data-tech="aws"].active     { background:#ff9900; color:#000; }
    .tab-btn[data-tech="dsa"].active     { background:#e64a19; color:#fff; }
    .tab-btn[data-tech="sysdesign"].active { background:#7c6af7; color:#fff; }
    .tab-btn[data-tech="interviewq"].active { background:#e91e8c; color:#fff; }
    .tab-btn[data-tech="roadmap"].active { background:linear-gradient(135deg,#7c6af7,#56cfb2); color:#fff; }
    .tab-btn[data-tech="typeorm"].active  { background:linear-gradient(135deg,#e96b00,#c0392b); color:#fff; }
    .tab-btn[data-tech="typescript"].active { background:#3178c6; color:#fff; }
    .tab-btn[data-tech="behavioral"].active { background:#43a047; color:#fff; }
    .tab-btn[data-tech="git"].active { background:#f05032; color:#fff; }
    .tab-btn[data-tech="progress"].active { background:linear-gradient(135deg,#56cfb2,#7c6af7); color:#fff; }

    /* PROGRESS */
    .global-progress { max-width: 900px; margin: 0 auto 0.8rem; }
    .progress-bar-wrap { background: var(--surface); border-radius: 999px; height: 10px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 0.3rem; }
    .progress-bar { height: 100%; border-radius: 999px; transition: width 0.3s ease; width: 0%; }
    .progress-label { text-align: center; color: var(--muted); font-size: 0.78rem; }
    .controls { display: flex; justify-content: center; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 1.2rem; }
    button.ctrl { padding: 0.3rem 0.8rem; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; font-size: 0.78rem; transition: background 0.2s; }
    button.ctrl:hover { background: #7c6af7; border-color: #7c6af7; }

    /* TECH DESCRIPTION */
    .tech-desc { max-width: 1300px; margin: 0 auto 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem 1.2rem; display: flex; gap: 1rem; align-items: flex-start; }
    .tech-desc-badge { font-size: 1.8rem; flex-shrink: 0; }
    .tech-desc-body h3 { font-size: 1rem; margin-bottom: 0.25rem; }
    .tech-desc-body p { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }
    .tech-desc-body .tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.5rem; }
    .tech-desc-body .tag { font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 999px; background: var(--surface2); color: var(--muted); }

    /* GRID */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(265px, 1fr)); gap: 1rem; max-width: 1300px; margin: 0 auto; }
    .level-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; transition: border-color 0.2s; }
    .level-card:hover { border-color: #7c6af7; }
    .level-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.6rem; }
    .level-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
    .level-badge { font-size: 0.66rem; padding: 0.15rem 0.4rem; border-radius: 999px; background: var(--surface2); color: var(--muted); }
    .subsection { margin-bottom: 0.65rem; }
    .subsection-title { font-size: 0.68rem; font-weight: 700; margin-bottom: 0.22rem; text-transform: uppercase; letter-spacing: 0.05em; }
    ul { list-style: none; }
    li { display: flex; align-items: flex-start; gap: 0.4rem; padding: 0.17rem 0; font-size: 0.8rem; color: var(--text); cursor: pointer; border-radius: 4px; }
    li:hover { color: #fff; }
    li.done { color: var(--muted); text-decoration: line-through; }
    li input[type="checkbox"] { width: 13px; height: 13px; margin-top: 2px; flex-shrink: 0; cursor: pointer; }
    .card-progress { margin-top: 0.6rem; height: 3px; background: var(--surface2); border-radius: 999px; overflow: hidden; }
    .card-progress-fill { height: 100%; background: linear-gradient(90deg, #7c6af7, #56cfb2); border-radius: 999px; transition: width 0.3s; }

    /* DIFFICULTY */
    .diff-easy  { color: #48bb78 !important; }
    .diff-medium { color: #f6ad55 !important; }
    .diff-hard  { color: #fc8181 !important; }

    /* ROADMAP */
    /* PROGRESS DASHBOARD */
    .progress-wrap { max-width: 1100px; margin: 0 auto; padding: 0.5rem; }
    .progress-hero { text-align:center; margin-bottom: 1.5rem; }
    .progress-hero h2 { font-size: 1.3rem; margin-bottom: 0.3rem; }
    .progress-hero p { color: var(--muted); font-size: 0.82rem; }
    .progress-overall { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.2rem 1.5rem; margin-bottom: 1.5rem; text-align:center; }
    .progress-overall .big-pct { font-size: 3rem; font-weight: 800; background: linear-gradient(135deg,#56cfb2,#7c6af7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; line-height:1; }
    .progress-overall .big-bar-wrap { background: var(--surface2); border-radius: 999px; height: 14px; overflow:hidden; margin: 0.7rem auto; max-width: 500px; border:1px solid var(--border); }
    .progress-overall .big-bar { height: 100%; background: linear-gradient(90deg,#56cfb2,#7c6af7); border-radius:999px; transition: width 0.6s ease; }
    .progress-overall .big-label { color: var(--muted); font-size: 0.82rem; }
    .progress-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
    .pcard { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; cursor: pointer; transition: border-color 0.2s, transform 0.15s; }
    .pcard:hover { transform: translateY(-2px); }
    .pcard-top { display:flex; align-items:center; gap: 0.6rem; margin-bottom: 0.7rem; }
    .pcard-emoji { font-size: 1.4rem; }
    .pcard-name { font-size: 0.88rem; font-weight: 700; flex:1; }
    .pcard-pct { font-size: 1rem; font-weight: 800; }
    .pcard-bar-wrap { background: var(--surface2); border-radius: 999px; height: 7px; overflow:hidden; margin-bottom: 0.4rem; border:1px solid var(--border); }
    .pcard-bar { height:100%; border-radius:999px; transition: width 0.5s ease; }
    .pcard-count { font-size: 0.72rem; color: var(--muted); }
    .progress-streaks { display:grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap:0.75rem; }
    .streak-card { background: var(--surface); border:1px solid var(--border); border-radius:12px; padding:1rem; text-align:center; }
    .streak-card .s-num { font-size: 1.8rem; font-weight:800; }
    .streak-card .s-label { font-size:0.75rem; color:var(--muted); margin-top:0.2rem; }
    @media(max-width:500px){ .progress-overall .big-pct{font-size:2.2rem} .pcard-pct{font-size:0.88rem} }

    .roadmap-wrap { max-width: 1200px; margin: 0 auto; padding: 0.5rem; }
    .roadmap-section { margin-bottom: 2rem; }
    .roadmap-section h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.7rem; }
    .roadmap-track { display: flex; flex-wrap: wrap; gap: 0; align-items: stretch; }
    .roadmap-node { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1rem; min-width: 140px; flex: 1; position: relative; }
    .roadmap-node h4 { font-size: 0.82rem; font-weight: 700; margin-bottom: 0.3rem; }
    .roadmap-node ul { list-style: none; }
    .roadmap-node ul li { font-size: 0.72rem; color: var(--muted); padding: 0.08rem 0; display: block; cursor: default; }
    .roadmap-node ul li:hover { color: var(--text); }
    .roadmap-node ul li::before { content: "› "; }
    .roadmap-arrow { display: flex; align-items: center; padding: 0 0.3rem; color: var(--muted); font-size: 1.2rem; flex-shrink: 0; }
    .roadmap-node.highlight { border-color: #7c6af7; }
    .roadmap-node.done-node { border-color: var(--done); }
    .roadmap-month { font-size: 0.65rem; color: var(--muted); margin-top: 0.35rem; display: block; }
    .roadmap-parallel { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 0.75rem; }
    @media(max-width:600px) { .roadmap-parallel { grid-template-columns: 1fr; } .roadmap-track { flex-direction: column; } .roadmap-arrow { transform: rotate(90deg); align-self: center; } }
    .stage-badge { display: inline-block; font-size: 0.65rem; font-weight: 700; padding: 0.12rem 0.4rem; border-radius: 4px; margin-bottom: 0.4rem; color: #fff; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem auto; max-width: 1300px; }
    .roadmap-legend { display: flex; gap: 1.2rem; flex-wrap: wrap; font-size: 0.72rem; color: var(--muted); margin-bottom: 1rem; justify-content: center; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }
  </style>
</head>

  <button class="tab-btn"         data-tech="git"        onclick="switchTab('git')">Git</button>
  <button class="tab-btn"         data-tech="typeorm"    onclick="switchTab('typeorm')">Express+TypeORM</button>

</div>

<div class="global-progress">

</div>

/* ═══════════════════════ ENGINE ═══════════════════════ */
const STORAGE_KEY = 'fullstack-mastery-v3';
let currentTech = 'progress';

function getState() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); } catch{return{};} }
function setState(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
function makeId(tech,li,si,ii){ return `${tech}|${li}|${si}|${ii}`; }

function techTotals(tech){
  if(tech==='roadmap'||tech==='progress') return {total:0,done:0};
  const state=getState(); let total=0,done=0;
  (data[tech]?.levels||[]).forEach((lvl,li)=>lvl.sections.forEach((sec,si)=>sec.items.forEach((_,ii)=>{total++;if(state[makeId(tech,li,si,ii)])done++;})));
  return {total,done};
}

function updateGlobal(){
  if(currentTech==='roadmap'){ document.getElementById('globalLabel').textContent='Visual roadmap — no progress tracking'; document.getElementById('globalBar').style.width='0%'; return; }
  if(currentTech==='progress'){ document.getElementById('globalLabel').textContent='Your overall progress dashboard'; document.getElementById('globalBar').style.width='0%'; return; }
  const c=data[currentTech]?.color||['#7c6af7'];
  const {total,done}=techTotals(currentTech);
  const pct=total?Math.round(done/total*100):0;
  const bar=document.getElementById('globalBar');
  bar.style.width=pct+'%';
  bar.style.background=`linear-gradient(90deg,${c[0]},${c[0]}99)`;
  document.getElementById('globalLabel').textContent=`${done} / ${total} topics done (${pct}%)`;
}

function diffClass(d){ return d==='easy'?'diff-easy':d==='medium'?'diff-medium':d==='hard'?'diff-hard':''; }

function renderTech(tech){
  const id='panel-'+tech;
  if(document.getElementById(id)) return;
  if(tech==='progress'){ renderProgress(); return; }
  if(tech==='roadmap'){ renderRoadmap(); return; }

  const d=data[tech]; if(!d) return;
  const state=getState();
  const c=d.color;

  const panel=document.createElement('div');
  panel.className='tab-panel'; panel.id=id;

  // Tech description
  const desc=document.createElement('div');
  desc.className='tech-desc';
  desc.innerHTML=`<div class="tech-desc-badge">${d.emoji}</div><div class="tech-desc-body"><h3 style="color:${c[0]}">${Object.keys(data).find(k=>data[k]===d)||tech}</h3><p>${d.description}</p><div class="tags">${(d.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div></div>`;
  panel.appendChild(desc);

  const grid=document.createElement('div');
  grid.className='grid'; panel.appendChild(grid);

  (d.levels||[]).forEach((lvl,li)=>{
    const allIds=lvl.sections.flatMap((s,si)=>s.items.map((_,ii)=>makeId(tech,li,si,ii)));
    const doneCount=allIds.filter(id=>state[id]).length;
    const pct=allIds.length?Math.round(doneCount/allIds.length*100):0;

    const card=document.createElement('div');
    card.className='level-card';

    const hdr=document.createElement('div');
    hdr.className='level-header';
    const lt=document.createElement('span'); lt.className='level-title'; lt.style.color=c[0]; lt.textContent=`${lvl.level} — ${lvl.tag}`;
    const lb=document.createElement('span'); lb.className='level-badge'; lb.textContent=`${doneCount}/${allIds.length}`; lb.dataset.lb=`${tech}-${li}`;
    hdr.appendChild(lt); hdr.appendChild(lb); card.appendChild(hdr);

    lvl.sections.forEach((sec,si)=>{
      const sub=document.createElement('div'); sub.className='subsection';
      const st=document.createElement('div'); st.className='subsection-title '+diffClass(sec.difficulty||'');
      st.textContent=sec.title; sub.appendChild(st);
      const ul=document.createElement('ul');

      sec.items.forEach((item,ii)=>{
        const eid=makeId(tech,li,si,ii);
        const done=!!state[eid];
        const liEl=document.createElement('li');
        if(done) liEl.classList.add('done');
        const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=done; cb.style.accentColor=c[0];
        cb.addEventListener('change',()=>{
          const s=getState();
          if(cb.checked) s[eid]=true; else delete s[eid];
          setState(s); liEl.classList.toggle('done',cb.checked);
          updateCardStats(card,tech,li,lvl); updateGlobal();
        });
        const lbl=document.createElement('span'); lbl.textContent=item;
        lbl.addEventListener('click',()=>cb.click());
        liEl.appendChild(cb); liEl.appendChild(lbl); ul.appendChild(liEl);
      });

      sub.appendChild(ul); card.appendChild(sub);
    });

    const cpWrap=document.createElement('div'); cpWrap.className='card-progress';
    const cpFill=document.createElement('div'); cpFill.className='card-progress-fill';
    cpFill.style.width=pct+'%'; cpFill.style.background=`linear-gradient(90deg,${c[0]},${c[0]}77)`;
    cpFill.dataset.cf=`${tech}-${li}`; cpWrap.appendChild(cpFill); card.appendChild(cpWrap);
    grid.appendChild(card);
  });

  document.getElementById('panels').appendChild(panel);
}

function updateCardStats(card,tech,li,lvl){
  const state=getState();
  const allIds=lvl.sections.flatMap((s,si)=>s.items.map((_,ii)=>makeId(tech,li,si,ii)));
  const doneCount=allIds.filter(id=>state[id]).length;
  const pct=allIds.length?Math.round(doneCount/allIds.length*100):0;
  const fill=card.querySelector(`[data-cf="${tech}-${li}"]`);
  if(fill) fill.style.width=pct+'%';
  const badge=card.querySelector(`[data-lb="${tech}-${li}"]`);
  if(badge) badge.textContent=`${doneCount}/${allIds.length}`;
}

function renderProgress(){
  const id='panel-progress';
  const existing=document.getElementById(id);
  /* always re-render to show fresh counts */
  if(existing) existing.remove();

  const techs=[
    {key:'js',         label:'JavaScript'},
    {key:'react',      label:'React'},
    {key:'node',       label:'Node.js'},
    {key:'mysql',      label:'MySQL'},
    {key:'mongo',      label:'MongoDB'},
    {key:'aws',        label:'AWS'},
    {key:'typescript', label:'TypeScript'},
    {key:'git',        label:'Git'},
    {key:'dsa',        label:'DSA'},
    {key:'sysdesign',  label:'System Design'},
    {key:'interviewq', label:'Interview Q'},
    {key:'behavioral', label:'Behavioral / HR'},
    {key:'typeorm',    label:'Express+TypeORM'},
  ];

  let grandTotal=0, grandDone=0;
  const rows=techs.map(t=>{
    const {total,done}=techTotals(t.key);
    grandTotal+=total; grandDone+=done;
    return {...t,total,done};
  });

  const grandPct=grandTotal?Math.round(grandDone/grandTotal*100):0;

  /* stat helpers */
  const mastered=rows.filter(r=>r.total>0&&r.done===r.total).length;
  const started=rows.filter(r=>r.done>0&&r.done<r.total).length;
  const untouched=rows.filter(r=>r.done===0).length;

  const state=getState();
  const cards=rows.map(r=>{
    const pct=r.total?Math.round(r.done/r.total*100):0;
    const col=(data[r.key]?.color||['#7c6af7'])[0];
    const emoji=data[r.key]?.emoji||'📘';

    /* per-level breakdown rows */
    const levels=data[r.key]?.levels||[];
    const levelRows=levels.map((lvl,li)=>{
      let lt=0,ld=0;
      lvl.sections.forEach((sec,si)=>sec.items.forEach((_,ii)=>{lt++;if(state[makeId(r.key,li,si,ii)])ld++;}));
      const lp=lt?Math.round(ld/lt*100):0;
      return `<div style="margin-bottom:0.35rem">
        <div style="display:flex;justify-content:space-between;font-size:0.7rem;color:var(--muted);margin-bottom:2px">
          <span>${lvl.level||lvl.tag||('Level '+(li+1))}</span>
          <span style="color:${col};font-weight:700">${lp}%</span>
        </div>
        <div style="background:var(--surface2);border-radius:999px;height:4px;overflow:hidden">
          <div style="width:${lp}%;height:100%;background:${col};border-radius:999px;transition:width 0.4s"></div>
        </div>
      </div>`;
    }).join('');

    return `
    <div class="pcard" style="border-color:${pct===100?col:'var(--border)'}">
      <div class="pcard-top" onclick="switchTab('${r.key}')" style="cursor:pointer">
        <span class="pcard-emoji">${emoji}</span>
        <span class="pcard-name">${r.label}</span>
        <span class="pcard-pct" style="color:${col}">${pct}%</span>
      </div>
      <div class="pcard-bar-wrap">
        <div class="pcard-bar" style="width:${pct}%;background:${col}"></div>
      </div>
      <div class="pcard-count" style="margin-bottom:${levelRows?'0.6rem':'0'}">${r.done} / ${r.total} topics${pct===100?' ✅':''}</div>
      ${levelRows ? `<div style="border-top:1px solid var(--border);padding-top:0.6rem">${levelRows}</div>` : ''}
    </div>`;
  }).join('');

  const panel=document.createElement('div');
  panel.className='tab-panel'; panel.id=id;
  panel.innerHTML=`
<div class="progress-wrap">
  <div class="progress-hero">
    <h2>📊 My Learning Progress</h2>
    <p>Click any card to jump to that topic</p>
  </div>

  <div class="progress-overall">
    <div class="big-pct">${grandPct}%</div>
    <div class="big-bar-wrap"><div class="big-bar" style="width:${grandPct}%"></div></div>
    <div class="big-label">${grandDone} of ${grandTotal} total topics completed across all sections</div>
  </div>

  <div class="progress-streaks">
    <div class="streak-card">
      <div class="s-num" style="color:#48bb78">${mastered}</div>
      <div class="s-label">Sections mastered (100%)</div>
    </div>
    <div class="streak-card">
      <div class="s-num" style="color:#f6ad55">${started}</div>
      <div class="s-label">Sections in progress</div>
    </div>
    <div class="streak-card">
      <div class="s-num" style="color:#fc8181">${untouched}</div>
      <div class="s-label">Not started yet</div>
    </div>

    </div>
  </div>

  <hr class="divider" style="margin:1.2rem auto">

  <div class="progress-grid">${cards}</div>
</div>`;

  document.getElementById('panels').appendChild(panel);
}

function switchTab(tech){
  currentTech=tech;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tech===tech));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  renderTech(tech);
  const panel=document.getElementById('panel-'+tech);
  if(panel) panel.classList.add('active');
  updateGlobal();
}

function resetCurrent(){
  if(!confirm(`Reset all ${currentTech.toUpperCase()} progress?`)) return;
  const s=getState();
  Object.keys(s).forEach(k=>{ if(k.startsWith(currentTech+'|')) delete s[k]; });
  setState(s);
  const panel=document.getElementById('panel-'+currentTech);
  if(panel) panel.remove();
  switchTab(currentTech);
}

function resetAll(){
  if(!confirm('Reset ALL progress for all technologies?')) return;
  localStorage.removeItem(STORAGE_KEY);
  document.querySelectorAll('.tab-panel').forEach(p=>p.remove());
  switchTab(currentTech);
}

switchTab('progress');
</script>
